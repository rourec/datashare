<div class="upload-page">
  <header class="upload-header">
    <h1>DataShare</h1>

    <button
      class="login-button"
      type="button"
      (click)="goToLogin()"
    >
      Se connecter
    </button>
  </header>

  <main class="upload-main">
    <div class="upload-card">
      <h2>Ajouter un fichier</h2>

      <input
        #fileInput
        data-cy="file-input"
        class="hidden-file-input"
        type="file"
        accept=".txt,.pdf,.png,.jpg,.jpeg,.docx,.xlsx,.pptx"
        (change)="onFileSelected($event)"
      />

      <div class="selected-file">
        <div class="file-main">
          <span class="file-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M6 2h9l5 5v15H6V2z"></path>
              <path d="M14 2v6h6"></path>
              <path d="M8 14h8"></path>
              <path d="M8 18h8"></path>
            </svg>
          </span>

          <div class="file-details">
            <span
              class="file-name"
              *ngIf="selectedFile; else noFile"
            >
              {{ selectedFile.name }}
            </span>

            <ng-template #noFile>
              <span class="file-name muted">
                Aucun fichier sélectionné
              </span>
            </ng-template>

            <span
              class="file-size"
              [class.file-size-error]="fileTooLarge"
              *ngIf="selectedFile"
            >
              {{ formatFileSize(selectedFile.size) }}
            </span>
          </div>
        </div>

        <button
          class="change-button"
          type="button"
          (click)="fileInput.click()"
        >
          Changer
        </button>
      </div>

      <p
        class="file-limit-error"
        *ngIf="fileTooLarge"
      >
        La taille des fichiers est limitée à 1 Go.
      </p>

      <div class="form-fields">
        <label class="field">
          Expiration

          <select
            data-cy="expiration-days"
            [(ngModel)]="expirationDays"
          >
            <option [ngValue]="1">Une journée</option>
            <option [ngValue]="2">2 jours</option>
            <option [ngValue]="3">3 jours</option>
            <option [ngValue]="4">4 jours</option>
            <option [ngValue]="5">5 jours</option>
            <option [ngValue]="6">6 jours</option>
            <option [ngValue]="7">Une semaine</option>
          </select>
        </label>
      </div>

      <p
        class="error-message"
        *ngIf="errorMessage && !fileTooLarge"
      >
        {{ errorMessage }}
      </p>

      <button
        type="button"
        data-cy="upload-submit"
        class="upload-button"
        (click)="upload()"
        [disabled]="uploadDisabled"
      >
        <span class="upload-cloud" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M16 16l-4-4-4 4M12 12v9"></path>
            <path
              d="M20.4 17.5A5 5 0 0 0 18 8.2
                 7 7 0 0 0 4.3 10.5
                 4 4 0 0 0 5 18h2"
            ></path>
          </svg>
        </span>

        {{ loading ? 'Téléversement...' : 'Téléverser' }}
      </button>
    </div>
  </main>
</div>
