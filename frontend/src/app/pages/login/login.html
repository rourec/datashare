<div class="auth-page">
  <header class="auth-header">
    <h1>DataShare</h1>

    <button
      class="header-login-button"
      type="button"
      (click)="goToLogin()"
    >
      Se connecter
    </button>
  </header>

  <main class="auth-main">
    <app-card>
      <form
        class="login-form"
        (ngSubmit)="onSubmit()"
      >
        <h2>Connexion</h2>

        <div class="form-fields">
          <label>
            Email

            <input
              type="email"
              data-cy="login-email"
              name="email"
              placeholder="Saisissez votre email..."
              [(ngModel)]="email"
              required
            />
          </label>

          <label>
            Mot de passe

            <input
              type="password"
              data-cy="login-password"
              name="password"
              placeholder="Saisissez votre mot de passe..."
              [(ngModel)]="password"
              required
            />
          </label>
        </div>

        <p
          class="success-message"
          *ngIf="successMessage"
        >
          {{ successMessage }}
        </p>

        <p
          class="error-message"
          *ngIf="errorMessage"
        >
          {{ errorMessage }}
        </p>

        <div class="form-actions">
          <button
            type="button"
            class="link-button"
            (click)="goToRegister()"
          >
            Créer un compte
          </button>

          <button
            data-cy="login-submit"
            type="submit"
            class="primary-button"
          >
            Connexion
          </button>
        </div>
      </form>
    </app-card>
  </main>
</div>
